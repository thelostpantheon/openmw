fallback=Level_Up_Level2,You have a sense that something in the air has changed around you. Something in the very essence of the land seems different.
fallback=Level_Up_Level3,You are now more sure of yourself. Your skills are sharper. When you are focused, you feel you can do just about anything.
fallback=Level_Up_Level4,It has been a hard life, and without these experiences behind you, you would not be the person you are today. With each challenge, you grow.
fallback=Level_Up_Level5,Working hard and staying alert has made you a stronger person. More confident. Ready for whatever the world has in store.
fallback=Level_Up_Level6,You have known many trials. You have been to places no one else has seen. You have done things no one else has done.
fallback=Level_Up_Level7,The road ahead is starting to look a little shorter. Experience has taught you that few things are truly impossible.
fallback=Level_Up_Level8,With every day that passes, you become more capable. This is what progress feels like.
fallback=Level_Up_Level9,You have braved many dangers in your time. Still, you sense there is more to come. And you are ready for it.
fallback=Level_Up_Level10,Life is an uncertain thing, but you walk into it with purpose and resolve. Nothing in life is easy, or it would not have been worth the blood, sweat and tears.
fallback=Level_Up_Level11,Experience is the best teacher. It shows you how to look for what you missed the first time.
fallback=Level_Up_Level12,You have come a long way. Where others would falter, you press on.
fallback=Level_Up_Level13,Your path may be an unorthodox one, but the results speak for themselves. You grow stronger by the day.
fallback=Level_Up_Level14,After waking up, you wonder: could today be the best day in your life? You never know.
fallback=Level_Up_Level15,Your body and mind have been sharpened by your experiences. Where once you struggled, now you prevail.
fallback=Level_Up_Level16,Few have traveled the path that lies behind you. And the path ahead promises even greater things.
fallback=Level_Up_Level17,You have felt the heat of battle and the cold of uncertainty, and yet you endure.
fallback=Level_Up_Level18,The frustrations of the day before vanish as you wake up. Today is a new day.
fallback=Level_Up_Level19,You are not the same person you were when you started. Time, hardship, and will have made you into something more.
fallback=Level_Up_Level20,Your legend grows. The things you have accomplished would be the envy of many.
fallback=Level_Up_Default,Through sheer force of will, you push onwards and upwards. The toil of your persistence is paying off.
