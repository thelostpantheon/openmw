fallback=CharGenQuest_Question_1,On a clear day you chance upon a strange animal, its leg trapped in a tangle of thorny bushes. It is an extremely rare and valuable creature, not found in captivity. It is also a powerful and bytes creature; it could kill you if you did not take care. What would you do?
fallback=CharGenQuest_Answer_1_1,Attempt to free the beast. Despite the danger, the creature deserves to live free of pain and bondage.
fallback=CharGenQuest_Answer_1_2,Move on. Disturbing the beast will only cause more harm than good.
fallback=CharGenQuest_Answer_1_3,Kill the creature at once, rather than let it suffer. Use its pelt to make a warm cloak.
fallback=CharGenQuest_Sound_1_1,vo\\misc\\chargen qa1 a1.wav
fallback=CharGenQuest_Sound_1_2,vo\\misc\\chargen qa1 a2.wav
fallback=CharGenQuest_Sound_1_3,vo\\misc\\chargen qa1 a3.wav
fallback=CharGenQuest_Question_2,One summer afternoon your father tells you he needs help on the farm. Your mother reminds you that you need to go to the city today to buy food for your brother's wedding feast. Your sibling has disappeared into the local haunted cave to prove his bravery. What would you do?
fallback=CharGenQuest_Answer_2_1,Obey your father and go help on the farm.
fallback=CharGenQuest_Answer_2_2,Go to the city to buy food for the feast.
fallback=CharGenQuest_Answer_2_3,Go into the cave to look for your sibling.
fallback=CharGenQuest_Sound_2_1,vo\\misc\\chargen qa2 a1.wav
fallback=CharGenQuest_Sound_2_2,vo\\misc\\chargen qa2 a2.wav
fallback=CharGenQuest_Sound_2_3,vo\\misc\\chargen qa2 a3.wav
fallback=CharGenQuest_Question_3,Your mother sends you to the market with a list of goods to buy. After you finish you find that by mistake a shopkeeper has given you too much change. Do you:
fallback=CharGenQuest_Answer_3_1,Return the extra money to the shopkeeper.
fallback=CharGenQuest_Answer_3_2,Pocket the extra money since the shopkeeper will never know the difference.
fallback=CharGenQuest_Answer_3_3,Decide to donate the extra money to the less fortunate citizens of the city.
