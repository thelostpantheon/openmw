# OpenMW base configuration for PS Vita
# Essential path defaults (inside VPK as app0:openmw.cfg)
# User overrides: ux0:data/openmw/config/openmw.cfg

config=?userconfig?
user-data=?userdata?
resources=?local?/resources
data="?userdata?/Data Files"

# content and fallback-archive are NOT specified here — the user's
# config (ux0:data/openmw/config/openmw.cfg) provides them.
# Specifying them here would duplicate entries due to composing().

