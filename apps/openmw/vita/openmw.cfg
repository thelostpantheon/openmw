fallback=CharGenQuest_Question_9,A mysterious stranger approaches you in a tavern and offers to sell you a map leading to a great treasure. The price is steep and you have heard rumors of fake maps circulating. What would you do?
fallback=CharGenQuest_Answer_9_1,Buy the map. Fortune favors the bold, and adventure awaits.
fallback=CharGenQuest_Answer_9_2,Decline. The risk of deception is too high, and you prefer certain gain.
fallback=CharGenQuest_Answer_9_3,Examine the map closely and try to verify its authenticity before deciding.
