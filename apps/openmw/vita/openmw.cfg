fallback=CharGenQuest_Sound_6_3,vo\\misc\\chargen qa6 a3.wav
fallback=CharGenQuest_Question_7,Your mentor offers you the chance to learn a secret but forbidden technique. With it, you could protect your loved ones from harm, but discovery would brand you an outlaw. What would you do?
fallback=CharGenQuest_Answer_7_1,Refuse the offer. No power is worth breaking the law and risking your honor.
fallback=CharGenQuest_Answer_7_2,Accept the training, but vow to only use it in dire need.
fallback=CharGenQuest_Answer_7_3,Accept eagerly. Knowledge is power, and you will use it as you see fit.
