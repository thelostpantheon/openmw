fallback=CharGenQuest_Question_10,You find a journal belonging to a recently deceased nobleman. It contains evidence of corruption among the town's officials. What would you do?
fallback=CharGenQuest_Answer_10_1,Take the journal to the authorities, trusting the system to handle justice.
fallback=CharGenQuest_Answer_10_2,Publish the journal's contents so the people can decide for themselves.
fallback=CharGenQuest_Answer_10_3,Use the information for your own advantage, leveraging it to gain favors.
