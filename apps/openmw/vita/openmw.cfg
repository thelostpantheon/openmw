fallback=CharGenQuest_Sound_7_3,vo\\misc\\chargen qa7 a3.wav
fallback=CharGenQuest_Question_8,During a storm at sea, the ship's captain is washed overboard. The crew panics as the ship heads toward rocks. You have some sailing experience. What would you do?
fallback=CharGenQuest_Answer_8_1,Take command and steer the ship away from the rocks.
fallback=CharGenQuest_Answer_8_2,Help organize the crew to search for the captain in the water.
fallback=CharGenQuest_Answer_8_3,Secure your own safety first, then assist where you can.
