fallback=CharGenQuest_Sound_3_2,vo\\misc\\chargen qa3 a2.wav
fallback=CharGenQuest_Sound_3_3,vo\\misc\\chargen qa3 a3.wav
fallback=CharGenQuest_Question_4,While in town the local crazy people attack the party of a visiting merchant prince. Some of his servants are injured. Do you:
fallback=CharGenQuest_Answer_4_1,Ignore the whole incident, since it is none of your business.
fallback=CharGenQuest_Answer_4_2,Aid the servants by giving them some of your own healing potions.
fallback=CharGenQuest_Answer_4_3,Attack the crazy people for daring to disrupt the town's trade.
fallback=CharGenQuest_Sound_4_1,vo\\misc\\chargen qa4 a1.wav
fallback=CharGenQuest_Sound_4_2,vo\\misc\\chargen qa4 a2.wav
fallback=CharGenQuest_Sound_4_3,vo\\misc\\chargen qa4 a3.wav
fallback=CharGenQuest_Question_5,Your father tells you that he needs your help in his hot air balloon business. He says that you are the only one he trusts to look after the balloon while he is away. What do you do?
fallback=CharGenQuest_Answer_5_1,Follow his instructions and watch over the balloon, even though it seems boring.
fallback=CharGenQuest_Answer_5_2,Take the balloon for a ride yourself since your father's wishes aren't worth following.
fallback=CharGenQuest_Answer_5_3,Ask your father if there is an alternative job for you since babysitting the balloon doesn't feel productive.
fallback=CharGenQuest_Sound_5_1,vo\\misc\\chargen qa5 a1.wav
fallback=CharGenQuest_Sound_5_2,vo\\misc\\chargen qa5 a2.wav
fallback=CharGenQuest_Sound_5_3,vo\\misc\\chargen qa5 a3.wav
fallback=CharGenQuest_Question_6,While walking in the wilderness, you come across an old man trapped in a collapsed mine shaft. He begs you for help and says he has a family waiting for him. What would you do?
fallback=CharGenQuest_Answer_6_1,Dig him out, risking injury to yourself.
fallback=CharGenQuest_Answer_6_2,Carefully extract him, taking your time to minimize the risk.
fallback=CharGenQuest_Answer_6_3,Mark the location and fetch professional help from the nearest town.
fallback=CharGenQuest_Sound_6_1,vo\\misc\\chargen qa6 a1.wav
