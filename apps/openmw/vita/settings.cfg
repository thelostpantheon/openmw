# Vita platform settings — these values match applySettingsOverrides() in VitaInit.cpp.
# The code overrides always take precedence at runtime; this file provides
# correct defaults for any setting that might be read before overrides apply.

[GUI]
controller menus = true
scaling factor = 0.8
font size = 18

[Input]
enable controller = true
gamepad cursor speed = 0.15
camera sensitivity = 0.4

[Camera]
viewing distance = 2048.0
field of view = 45.0
small feature culling = true
small feature culling pixel size = 8.0
reverse z = false
vita dynamic fog = true

[Terrain]
object paging = false
object paging active grid = false
composite map resolution = 32
lod factor = 12.0
distant terrain = false

[Navigator]
enable = false

[Cells]
preload enabled = false
preload exterior grid = false
preload fast travel = false
preload doors = false
preload instances = false
preload num threads = 1
preload cell cache min = 1
preload cell cache max = 1
target framerate = 30
cache expiry delay = 5.0
pointers cache size = 40

[Map]
local map resolution = 64
local map widget size = 128
global map cell size = 4

[Shaders]
lighting method = legacy
force shaders = false
force per pixel lighting = false
auto use object normal maps = false
auto use object specular maps = false
auto use terrain normal maps = false
auto use terrain specular maps = false
soft particles = false
weather particle occlusion = false
antialias alpha test = false
adjust coverage for alpha test = false
max lights = 2
maximum light distance = 2048.0
light fade start = 0.85
light bounds multiplier = 1.0

[Shadows]
enable shadows = false

[Post Processing]
enabled = false

[Groundcover]
enabled = false

[Video]
# Internal render resolution. Vita tab exposes 480x272 / 512x288 /
# 640x368 — 640 matches the vglInit backbuffer 1:1, which is the
# sharpest option before HW upscale to 960x544. Higher widths were
# tried (720x408, 768x432) but produced a black screen — vitaGL
# doesn't enforce the Vita display controller's allowed framebuffer
# geometries, so anything past 640x368 falls off the supported set.
resolution x = 640
resolution y = 368
antialiasing = 0
framerate limit = 30

[Water]
shader = false
refraction = false
reflection detail = 0
rain ripple detail = 0

[Fog]
use distant fog = false
radial fog = false
exponential fog = false
sky blending = false

[Game]
actors processing range = 3584

[Physics]
async num threads = 1

[Lua]
lua num threads = 0
memory limit = 33554432
lua profiler = false
gc steps per frame = 50

[General]
anisotropy = 0
# Caps texture edge size at load time on Vita. See ImageManager::getImage.
# performance: world=64,  atlas=512   (lowest VRAM)
# balanced:    world=128, atlas=768   (default)
# high:        world=256, atlas=1024
# off:         no cap (full resolution)
# Restart required to take effect.
vita texture detail = balanced

[Sound]
buffer cache min = 1
buffer cache max = 4

[Stereo]
stereo enabled = false

[Windows]
# Vita: top 7% reserved for the inventory-mode tab bar, bottom 7% for the
# controller-buttons overlay (each = 48 logical px / 680 logical viewport).
# Inner padding 0.015; gap between quadrants 0.02. All windows fit in y∈[0.075, 0.925].
stats x = 0.015
stats y = 0.075
stats w = 0.475
stats h = 0.42
stats maximized x = 0.015
stats maximized y = 0.075
stats maximized w = 0.97
stats maximized h = 0.85
map x = 0.51
map y = 0.075
map w = 0.475
map h = 0.42
map maximized x = 0.015
map maximized y = 0.075
map maximized w = 0.97
map maximized h = 0.85
inventory x = 0.015
inventory y = 0.505
inventory w = 0.475
inventory h = 0.42
inventory maximized x = 0.015
inventory maximized y = 0.075
inventory maximized w = 0.97
inventory maximized h = 0.85
spells x = 0.51
